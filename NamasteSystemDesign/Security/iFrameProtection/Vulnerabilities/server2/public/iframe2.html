<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Malicious iFrame</title>
  </head>
  <body>
    <h1>Malicious iFrame</h1>
    <p>This iFrame attempts to steal data from parent.</p>

    <script>
      window.alert("Hi");

      window.onload = function () {
        try {
          const parentWindow = window.parent;
          const parentDocument = parentWindow.document;

          const stolenData = parentDocument.innerHTML;
          alert("Stolen Data: ", stolenData);
        } catch (error) {
          console.log("Data theft failed: ", error);
        }
      };
    </script>
  </body>
</html>
